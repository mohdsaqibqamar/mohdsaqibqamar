<svg xmlns="http://www.w3.org/2000/svg" width="800" height="207" viewBox="0 0 800 207">
  <style>
    .g-blob1 { animation: g-drift1 12s ease-in-out infinite; }
    .g-blob2 { animation: g-drift2 12s ease-in-out infinite; }
    .g-blob3 { animation: g-drift3 12s ease-in-out infinite; }
    @keyframes g-drift1 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(40px, -25px); }
      50% { transform: translate(0, -50px); }
      75% { transform: translate(-40px, -25px); }
    }
    @keyframes g-drift2 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-30px, 25px); }
      50% { transform: translate(0, 50px); }
      75% { transform: translate(30px, 25px); }
    }
    @keyframes g-drift3 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(25px, -40px); }
      50% { transform: translate(-40px, 0); }
      75% { transform: translate(25px, 40px); }
    }
    .g-p { animation: g-pulse 3s ease-in-out infinite; }
    .p1 { animation-delay: -0.6s; }
    .p2 { animation-delay: -1.2s; }
    .p3 { animation-delay: -1.8s; }
    .p4 { animation-delay: -2.4s; }
    @keyframes g-pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.32; }
    }
  </style>
  <defs>
    <filter id="g-blur" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="g-card-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="g-mini-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="g-blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-vignette" cx="50%" cy="50%" r="65%">
      <stop offset="50%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="rgb(0,0,0)" stop-opacity="0.45"/>
    </radialGradient>
  </defs>
  
  <rect width="800" height="207" fill="#0b0b12"/>
  <g filter="url(#g-blur)" class="g-blobs">
    <circle class="g-blob1" cx="224.00000000000003" cy="113.85000000000001" r="220" fill="url(#g-blob1)"/>
    <circle class="g-blob2" cx="576" cy="93.15" r="240" fill="url(#g-blob2)"/>
    <circle class="g-blob3" cx="400" cy="217.35000000000002" r="200" fill="url(#g-blob3)"/>
  </g>
  <rect width="800" height="207" fill="url(#g-vignette)"/>
  <g class="g-particles"><circle class="g-p p0" cx="400" cy="103.5" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="768.68" cy="83.38" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="422.89" cy="201.57" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p3" cx="623.29" cy="10.66" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p4" cx="549.49" cy="190.24" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p0" cx="581.39" cy="20.7" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="650.43" cy="116.12" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="466.23" cy="49.21" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p3" cx="131.64" cy="122.13" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p4" cx="215.85" cy="23.07" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p0" cx="388.6" cy="163.79" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="328.48" cy="52.02" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="71.62" cy="114.66" r="1.2" fill="#ffffff" opacity="0.2"/></g>
  
  
