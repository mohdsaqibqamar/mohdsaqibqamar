<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <style>
    .g-blob1 { animation: g-drift1 12s ease-in-out infinite; }
    .g-blob2 { animation: g-drift2 12s ease-in-out infinite; }
    .g-blob3 { animation: g-drift3 12s ease-in-out infinite; }
    @keyframes g-drift1 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(40px, -25px); }
      50% { transform: translate(0, -50px); }
      75% { transform: translate(-40px, -25px); }
    }
    @keyframes g-drift2 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-30px, 25px); }
      50% { transform: translate(0, 50px); }
      75% { transform: translate(30px, 25px); }
    }
    @keyframes g-drift3 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(25px, -40px); }
      50% { transform: translate(-40px, 0); }
      75% { transform: translate(25px, 40px); }
    }
    .g-p { animation: g-pulse 3s ease-in-out infinite; }
    .p1 { animation-delay: -0.6s; }
    .p2 { animation-delay: -1.2s; }
    .p3 { animation-delay: -1.8s; }
    .p4 { animation-delay: -2.4s; }
    @keyframes g-pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.32; }
    }
  </style>
  <defs>
    <filter id="g-blur" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="g-card-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="g-mini-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="g-blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-vignette" cx="50%" cy="50%" r="65%">
      <stop offset="50%" stop-color="rgb(0,0,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="rgb(0,0,0)" stop-opacity="0.45"/>
    </radialGradient>
  </defs>
  
  <rect width="800" height="320" fill="#0b0b12"/>
  <g filter="url(#g-blur)" class="g-blobs">
    <circle class="g-blob1" cx="224.00000000000003" cy="176" r="220" fill="url(#g-blob1)"/>
    <circle class="g-blob2" cx="576" cy="144" r="240" fill="url(#g-blob2)"/>
    <circle class="g-blob3" cx="400" cy="336" r="200" fill="url(#g-blob3)"/>
  </g>
  <rect width="800" height="320" fill="url(#g-vignette)"/>
  <g class="g-particles"><circle class="g-p p0" cx="400" cy="160" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="768.68" cy="128.9" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="422.89" cy="311.6" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p3" cx="623.29" cy="16.48" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p4" cx="549.49" cy="294.09" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p0" cx="581.39" cy="31.99" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="650.43" cy="179.51" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="466.23" cy="76.08" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p3" cx="131.64" cy="188.8" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p4" cx="215.85" cy="35.67" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p0" cx="388.6" cy="253.2" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="328.48" cy="80.42" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="71.62" cy="177.26" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p3" cx="398.07" cy="43.05" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p4" cx="326.41" cy="232.52" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p0" cx="576.73" cy="133.75" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p1" cx="770.75" cy="252.99" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p2" cx="573.68" cy="116.77" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p3" cx="657.67" cy="264.98" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p4" cx="529.06" cy="155.4" r="1.2" fill="#ffffff" opacity="0.2"/><circle class="g-p p0" cx="704.15" cy="246.36" r="1.2" fill="#ffffff" opacity="0.2"/></g>
  
  
  <g filter="url(#g-card-shadow)">
    <rect x="30" y="30" width="740" height="260" rx="18" ry="18" fill="rgba(255,255,255,0.04)"/>
  </g>
  <rect x="30.5" y="30.5" width="739" height="259" rx="18" ry="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="31.5" y="31.5" width="737" height="257" rx="17" ry="17" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  
  <text x="62" y="110" fill="#f5f5f7" font-family='"Inter", system-ui, sans-serif' font-size="28" font-weight="700">Hi, I&apos;m Mohd Saqib Qamar</text>
  <text x="62" y="150" fill="#f5f5f7" opacity="0.75" font-family='"Inter", system-ui, sans-serif' font-size="14" font-weight="400">I build things that turn LLM rollouts into accountable workflows. Lately: agent</text>
  <text x="62" y="172" fill="#f5f5f7" opacity="0.75" font-family='"Inter", system-ui, sans-serif' font-size="14" font-weight="400">observability, replayable runs, and the kind of debugging tooling I wish existed when I</text>
  <text x="62" y="194" fill="#f5f5f7" opacity="0.75" font-family='"Inter", system-ui, sans-serif' font-size="14" font-weight="400">started.</text>
  <rect x="62" y="213" width="130" height="20" rx="10" ry="10" fill="#7c3aed" fill-opacity="0.18" stroke="#7c3aed" stroke-opacity="0.5" stroke-width="1"/>
  <text x="71" y="225" fill="#f5f5f7" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" font-weight="500">Software Engineer</text>
  <rect x="0.5" y="0.5" width="799" height="319" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>